<svg viewBox="0 0 540 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: #ffffff; stroke: #333333; stroke-width: 1.4; rx: 6; ry: 6; }
    .label { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; fill: #222222; }
    .small { font-size: 10px; fill: #555555; }
    .arrow { stroke: #555555; stroke-width: 1.2; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555555" />
    </marker>
  </defs>

  <!-- Contract -->
  <rect class="box" x="190" y="10" width="160" height="50" />
  <text class="label" x="270" y="30" text-anchor="middle">@reflex/contract</text>
  <text class="small" x="270" y="45" text-anchor="middle">laws &amp; interfaces</text>

  <!-- Runtime -->
  <rect class="box" x="190" y="90" width="160" height="50" />
  <text class="label" x="270" y="110" text-anchor="middle">@reflex/runtime</text>
  <text class="small" x="270" y="125" text-anchor="middle">time &amp; scheduler</text>

  <!-- Core -->
  <rect class="box" x="190" y="170" width="160" height="50" />
  <text class="label" x="270" y="190" text-anchor="middle">@reflex/core</text>
  <text class="small" x="270" y="205" text-anchor="middle">reactive structure</text>

  <!-- Public -->
  <rect class="box" x="190" y="250" width="160" height="50" />
  <text class="label" x="270" y="270" text-anchor="middle">reflex</text>
  <text class="small" x="270" y="285" text-anchor="middle">public API</text>

  <!-- Adapter -->
  <rect class="box" x="190" y="330" width="160" height="50" />
  <text class="label" x="270" y="350" text-anchor="middle">reflex-dom</text>
  <text class="small" x="270" y="365" text-anchor="middle">platform adapter</text>

  <!-- Arrows -->
  <line class="arrow" x1="270" y1="60" x2="270" y2="90" />
  <line class="arrow" x1="270" y1="140" x2="270" y2="170" />
  <line class="arrow" x1="270" y1="220" x2="270" y2="250" />
  <line class="arrow" x1="270" y1="300" x2="270" y2="330" />
</svg>
