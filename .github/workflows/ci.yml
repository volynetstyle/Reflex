name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - eslint.config.mjs
      - scripts/**
      - packages/@reflex/runtime/**
      - packages/reflex/**
  pull_request:
    paths:
      - .github/workflows/ci.yml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - eslint.config.mjs
      - scripts/**
      - packages/@reflex/runtime/**
      - packages/reflex/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: fast checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Runtime lint
        run: pnpm --filter @reflex/runtime lint

      - name: Runtime typecheck
        run: pnpm --filter @reflex/runtime typecheck

      - name: Runtime test
        run: pnpm --filter @reflex/runtime test

      - name: Runtime build
        run: pnpm --filter @reflex/runtime build

      - name: Reflex lint
        run: pnpm --filter @volynetstyle/reflex lint

      - name: Reflex typecheck
        run: pnpm --filter @volynetstyle/reflex typecheck

      - name: Reflex test
        run: pnpm --filter @volynetstyle/reflex test

      - name: Reflex build
        run: pnpm --filter @volynetstyle/reflex build

  runtime-e2e:
    name: runtime e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Runtime E2E
        run: pnpm --filter @reflex/runtime test:e2e